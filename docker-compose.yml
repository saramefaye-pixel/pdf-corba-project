version: '3.8'

services:

  # Serveur CORBA
  corba-server:
    build: ./corba-server
    container_name: corba-server
    ports:
      - "1050:1050"
    networks:
      - pdf-network
    healthcheck:
      test: ["CMD", "pgrep", "-f", "CORBAServer"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Middleware Spring Boot
  spring-client:
    build: ./spring-client
    container_name: spring-client
    ports:
      - "8080:8080"
    environment:
      - corba.host=corba-server
      - corba.port=1050
    depends_on:
      corba-server:
        condition: service_healthy
    networks:
      - pdf-network

networks:
  pdf-network:
    driver: bridge
